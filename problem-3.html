
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Problem-3</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    input, button { margin: 5px; padding: 5px; }
  </style>
</head>
<body>
  <h2>Problem-3: Odd Numbers (Odd/Even Rule)</h2>

  <input id="n" type="number" placeholder="Enter a number">
  <button onclick="generateSeries()">Generate</button>

  <h3>Result: <span id="result">—</span></h3>

  <script>
    function generateSeries() {
      const n = parseInt(document.getElementById('n').value);
      if (isNaN(n) || n < 1) {
        document.getElementById('result').innerText = "Please enter a valid positive integer";
        return;
      }

      // if even, take n-1; if odd, take n
      const limit = (n % 2 === 0) ? n - 1 : n;

      const result = [];
      for (let i = 0; i < limit; i++) {
        result.push(2 * i + 1);
      }

      document.getElementById('result').innerText = result.join(", ");
    }
  </script>
</body>
</html>
