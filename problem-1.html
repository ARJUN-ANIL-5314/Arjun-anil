<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Problem-1</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 50px; }
    input, select, button { margin: 5px; padding: 5px; }
  </style>
</head>
<body>

  <div style="border:2px solid black ; padding:30px ;width:55% ">
      <h2 style="text-align: center;">Calculator</h2>
 
  <span>A</span>
         <input id="a" type="number" placeholder="Enter first number">

  <span>B</span>
         <input id="b" type="number" placeholder="Enter second number">

  <select id="operation">
    <option value="add">Add</option>
    <option value="sub">Subtract</option>
    <option value="mul">Multiply</option>
    <option value="div">Divide</option>
  </select>

  <button onclick="calculate()">Calculate</button>

  <h3>Result: <span id="result">—</span></h3>

  </div>


  <script>
    function calculate() {
      const a = parseFloat(document.getElementById('a').value);
      const b = parseFloat(document.getElementById('b').value);
      const operation = document.getElementById('operation').value;
      let result;

      if (isNaN(a) || isNaN(b)) {
        result = "Please enter valid numbers";
      } else {
        switch (operation) {
          case "add": result = a + b; break;
          case "sub": result = a - b; break;
          case "mul": result = a * b; break;
          case "div": result = b === 0 ? "Error: Division by zero" : a / b; break;
          default: result = "Invalid operation";
        }
      }

      document.getElementById('result').innerText = result;
    }
  </script>
</body>
</html>
